name: Deploy Admin Web To GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BACKEND_API_URL: https://backend-fawn-seven-41.vercel.app/api
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate backend CORS preflight
        run: |
          ORIGIN="https://${{ github.repository_owner }}.github.io"
          HEADERS=$(curl -sS -D - -o /dev/null -X OPTIONS "${BACKEND_API_URL}/admin/dashboard" \
            -H "Origin: ${ORIGIN}" \
            -H "Access-Control-Request-Method: GET" \
            -H "Access-Control-Request-Headers: authorization,content-type")

          echo "$HEADERS"

          echo "$HEADERS" | grep -qi "^access-control-allow-headers:.*authorization" || {
            echo "::error::Backend CORS is missing Authorization in Access-Control-Allow-Headers."
            exit 1
          }

      - name: Build admin web
        env:
          VITE_API_URL: ${{ env.BACKEND_API_URL }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
